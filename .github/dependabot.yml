version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-major:
        dependency-type: production
        update-types:
          - major
      production-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
